apiVersion: v1
kind: Service
metadata:
  name: kbkb-scheduler-ui
  namespace: kbkb-system
spec:
  ports:
  - name: ui
    port: 8765
    targetPort: 8765
  selector:
    app.kubernetes.io/name: kbkb-scheduler
---
apiVersion: v1
kind: Service
metadata:
  name: kbkb-webhook-service
  namespace: kbkb-system
spec:
  ports:
  - port: 443
    protocol: TCP
    targetPort: 9443
  selector:
    app.kubernetes.io/name: kbkb-manager
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: kbkb-manager
  name: kbkb-manager
  namespace: kbkb-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kbkb-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kbkb-manager
    spec:
      containers:
      - args:
        - --leader-elect
        image: ghcr.io/omakeno/kbkb-manager:v2.0.0
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
        name: manager
        ports:
        - containerPort: 9443
          name: webhook
        - containerPort: 8080
          name: metrics
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
        resources:
          limits:
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        volumeMounts:
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: cert
          readOnly: true
      serviceAccountName: kbkb-manager
      volumes:
      - name: cert
        secret:
          secretName: webhook-server-cert
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: kbkb-scheduler
  name: kbkb-scheduler
  namespace: kbkb-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kbkb-scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kbkb-scheduler
    spec:
      containers:
      - args:
        - --namespace=default
        - --mode=manual
        - --max-height=12
        image: ghcr.io/omakeno/kbkb-scheduler:v2.0.0
        imagePullPolicy: IfNotPresent
        name: scheduler
        ports:
        - containerPort: 8765
          name: ui
        resources:
          limits:
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
      serviceAccountName: kbkb-scheduler
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kbkb-serving-cert
  namespace: kbkb-system
spec:
  dnsNames:
  - kbkb-webhook-service.kbkb-system.svc
  - kbkb-webhook-service.kbkb-system.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: kbkb-selfsigned-issuer
  secretName: webhook-server-cert
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: kbkb-selfsigned-issuer
  namespace: kbkb-system
spec:
  selfSigned: {}
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  annotations:
    cert-manager.io/inject-ca-from: kbkb-system/kbkb-serving-cert
  name: kbkb-mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: kbkb-webhook-service
      namespace: kbkb-system
      path: /mutate--v1-pod
  failurePolicy: Ignore
  name: color.kbkb.k8s.omakenoyouna.net
  objectSelector:
    matchLabels:
      kbkb.k8s.omakenoyouna.net/managed: "true"
  rules:
  - apiGroups:
    - ""
    apiVersions:
    - v1
    operations:
    - CREATE
    resources:
    - pods
  sideEffects: None
