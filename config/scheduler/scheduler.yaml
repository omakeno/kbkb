apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  namespace: system
  labels:
    app.kubernetes.io/name: kbkb-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kbkb-scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kbkb-scheduler
    spec:
      serviceAccountName: scheduler
      containers:
      - name: scheduler
        image: kbkb-scheduler:latest
        imagePullPolicy: IfNotPresent
        args:
        - --namespace=default
        - --mode=manual
        - --max-height=12
        ports:
        - name: ui
          containerPort: 8765
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: scheduler-ui
  namespace: system
spec:
  selector:
    app.kubernetes.io/name: kbkb-scheduler
  ports:
  - name: ui
    port: 8765
    targetPort: 8765
