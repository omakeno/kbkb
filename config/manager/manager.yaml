apiVersion: apps/v1
kind: Deployment
metadata:
  name: manager
  namespace: system
  labels:
    app.kubernetes.io/name: kbkb-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kbkb-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kbkb-manager
    spec:
      serviceAccountName: manager
      containers:
      - name: manager
        image: kbkb-manager:latest
        imagePullPolicy: IfNotPresent
        args:
        - --leader-elect
        ports:
        - name: webhook
          containerPort: 9443
        - name: metrics
          containerPort: 8080
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 128Mi
        volumeMounts:
        - name: cert
          mountPath: /tmp/k8s-webhook-server/serving-certs
          readOnly: true
      volumes:
      - name: cert
        secret:
          secretName: webhook-server-cert
