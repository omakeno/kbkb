---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - create
  - delete
  - get
  - list
  - watch
- apiGroups:
  - k8s.omakenoyouna.net
  resources:
  - kbkbs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - k8s.omakenoyouna.net
  resources:
  - kbkbs/status
  verbs:
  - get
  - patch
  - update
